<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempos York New</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/index.css">

</head>
<body>
    <header class="container">
        <nav id="primary" class="grid grid-flow-col">
            <div>
                <img src="assets/icon/List.svg" alt="Lista">
                <strong>Menu</strong>
            </div>
            <div>
                <img src="assets/icon/Logo.svg" alt="Logo site">
            </div>
            <div>
                <strong>Buscar</strong>
                <img src="assets/icon/MagnifyingGlass.svg" alt="Icone de busca">
            </div>
        </nav>
        <nav id="second" class="grid grid-flow-col">
            <a href="#">Inteligência Artificial</a>
            <a href="#">Blockchain</a>
            <a href="#">Hologramas</a>
            <a href="#">Internet</a>
            <a href="#">Vestíveis</a>
            <a href="#">Realidade Aumentada</a>
            <a href="#">Realidade Virtual</a>
        </nav>
    </header>

    <main class="grid container">
        <section id="featured" class="grid grid-flow-col gap-16">
            <figure class="card">
                <img src="assets/images/Image 01.png" alt="Primeiro destaque">
                <figcaption>
                    <span class="tag">Robótica</span>
                    <h2 class="txt-gg">
                        Robôs domésticos começam a ser adotados para tarefas diárias, promentendo mais conforto e eficiência nas residências.
                    </h2>
                </figcaption>
            </figure>

            <div class="grid grid-cols gap-16">
                <figure class="card">
                    <img src="assets/images/Image 02.png" alt="">
                    <figcaption>
                    <span class="tag">Hologramas</span>
                    <h2 class="txt-g">
                        Novo Smartphone Projetor 3D chega ao mercado, transformando a forma como vemos nossas telas!
                    </h2>
                </figcaption>
                </figure>
                <figure class="card">
                    <img src="assets/images/Image 03.png" alt="">
                    <figcaption>
                    <span class="tag">Internet</span>
                    <h2 class="txt-g">
                        Tecnologia 6G chega às metrópoles brasileiras, prometendo revolucionar a forma como vivemos e nos comunicamos.
                    </h2>
                </figcaption>
                </figure>
                <figure class="card">
                    <img src="assets/images/Image 04.png" alt="">
                    <figcaption>
                    <span class="tag">Vestíveis</span>
                    <h2 class="txt-g">
                        Empresa lança relógio inteligente capaz de monitorar a saúde mental, oferecendo insights valiosos para o bem-estar pessoal.
                    </h2>
                </figcaption>
                </figure>
                <figure class="card">
                    <img src="assets/images/Image 05.png" alt="">
                    <figcaption>
                    <span class="tag">Realidade Virtual</span>
                    <h2 class="txt-g">
                        Escolas adotam a tecnologia VR para proporcionar experiências imersivas, transformando a aprendizagem tradicional.
                    </h2>
                </figcaption>
                </figure>
            </div>
        </section>
    </main>
</body>
</html>
